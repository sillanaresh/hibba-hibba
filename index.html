<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Garden 🌸</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Fixed Icons - Top Right -->
    <button id="soundToggle" class="sound-toggle" title="Toggle Sound">🔊</button>
    <button id="settingsBtn" class="settings-icon" title="Admin Settings">⚙️</button>

    <div class="container">
        <header>
            <div class="header-left">
                <h1>Fun Garden 😝</h1>
                <p class="subtitle">Draw something cute and add it to our garden!</p>
            </div>
            <div class="category-buttons" id="categoryButtons" aria-label="Drawing categories">
                <button class="category-btn" data-category="cat" type="button" title="Draw cat" aria-label="Draw cat">
                    <span class="emoji">🐱</span>
                </button>
                <button class="category-btn" data-category="dog" type="button" title="Draw dog" aria-label="Draw dog">
                    <span class="emoji">🐶</span>
                </button>
                <button class="category-btn" data-category="flower" type="button" title="Draw flower" aria-label="Draw flower">
                    <span class="emoji">🌸</span>
                </button>
                <button class="category-btn" data-category="fish" type="button" title="Draw fish" aria-label="Draw fish">
                    <span class="emoji">🐟</span>
                </button>
                <button class="category-btn" data-category="duck" type="button" title="Draw duck" aria-label="Draw duck">
                    <span class="emoji">🦆</span>
                </button>
            </div>
        </header>

        <div class="garden">
            <div class="garden-heading">
                <div>
                    <h2>Our Garden</h2>
                    <p id="gardenStatus" class="garden-status">Connecting to the wall...</p>
                </div>
                <div class="wall-tools">
                    <div class="theme-switcher" aria-label="Garden theme">
                        <button class="theme-btn active" type="button" data-theme="morning" title="Morning garden" aria-label="Morning garden">☀️</button>
                        <button class="theme-btn" type="button" data-theme="moon" title="Moon garden" aria-label="Moon garden">🌙</button>
                        <button class="theme-btn" type="button" data-theme="picnic" title="Picnic garden" aria-label="Picnic garden">🧺</button>
                    </div>
                    <div id="filterBar" class="filter-bar" aria-label="Filter drawings"></div>
                    <button id="refreshWall" class="icon-btn" type="button" title="Refresh wall" aria-label="Refresh wall">↻</button>
                </div>
            </div>
            <div id="gardenGrid" class="garden-grid">
            </div>
        </div>
    </div>

    <!-- Drawing Modal -->
    <div id="drawingModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Draw your <span id="currentCategory"></span> <span id="categoryEmoji"></span></h3>
                <button class="close-btn" id="closeModal">&times;</button>
            </div>

            <div class="drawing-area">
                <div class="color-palette">
                    <button class="color-btn swatch-ink active" data-color="ink" title="Black"></button>
                    <button class="color-btn swatch-berry" data-color="berry" title="Pink"></button>
                    <button class="color-btn swatch-mint" data-color="mint" title="Mint"></button>
                    <button class="color-btn swatch-peach" data-color="peach" title="Peach"></button>
                    <button class="color-btn swatch-sky" data-color="sky" title="Sky Blue"></button>
                    <button class="eraser-btn" data-color="eraser" title="Eraser">⌫</button>
                </div>
                <div class="canvas-container">
                    <canvas id="drawingCanvas" width="200" height="200"></canvas>
                </div>
            </div>

            <div class="draw-tools" aria-label="Drawing tools">
                <div class="brush-sizes" aria-label="Brush size">
                    <button class="tool-btn brush-btn active" type="button" data-size="3" title="Tiny brush">•</button>
                    <button class="tool-btn brush-btn" type="button" data-size="6" title="Soft brush">●</button>
                    <button class="tool-btn brush-btn" type="button" data-size="10" title="Chunky brush">⬤</button>
                </div>
                <button id="rainbowMode" class="tool-btn" type="button" aria-pressed="false" title="Rainbow brush">🌈</button>
                <button id="sparkleMode" class="tool-btn" type="button" aria-pressed="false" title="Sparkle brush">✨</button>
                <button id="undoCanvas" class="tool-btn" type="button" title="Undo">↶</button>
            </div>

            <div class="modal-actions">
                <button id="clearCanvas" class="btn-secondary">Clear</button>
                <button id="submitDrawing" class="btn-primary">Add to Garden 🌱</button>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal">
        <div class="modal-content settings-content">
            <div class="modal-header">
                    <h3>Admin Settings</h3>
                <button class="close-btn" id="closeSettings">&times;</button>
            </div>

            <div class="settings-body">
                <!-- Add Emoji -->
                <div class="settings-section">
                    <h4>Add New Emoji Category</h4>
                    <button id="addEmojiBtn" class="btn-primary">Pick Emoji</button>
                    <div id="emojiPickerContainer"></div>
                </div>

                <!-- Remove Emoji -->
                <div class="settings-section">
                    <h4>Remove Emoji Category</h4>
                    <div id="emojiList" class="emoji-list">
                        <!-- Current emojis will appear here -->
                    </div>
                </div>

                <!-- Clear Garden -->
                <div class="settings-section">
                    <h4>Clear Entire Garden</h4>
                    <button id="clearGardenBtn" class="btn-danger">Delete All Drawings</button>
                </div>

                <div class="settings-section">
                    <h4>Backup</h4>
                    <button id="exportGardenBtn" class="btn-secondary">Export Garden Backup</button>
                </div>

                <!-- Remove Last N -->
                <div class="settings-section">
                    <h4>Remove Latest Drawings</h4>
                    <div class="number-action">
                        <input type="number" id="removeLastN" min="1" placeholder="Enter number">
                        <button id="removeLastNBtn" class="btn-secondary">Remove</button>
                    </div>
                </div>
            </div>

            <div class="settings-footer">
                <button id="closeSettingsBtn" class="btn-primary">Close Settings</button>
            </div>
        </div>
    </div>

    <div id="previewModal" class="modal">
        <div class="modal-content preview-content">
            <div class="modal-header">
                <h3><span id="previewEmoji">🌱</span> Garden sticker</h3>
                <button class="close-btn" id="closePreview">&times;</button>
            </div>
            <figure class="preview-frame">
                <img id="previewImage" alt="Large garden drawing">
                <figcaption id="previewCaption">A tiny drawing from the garden.</figcaption>
            </figure>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
