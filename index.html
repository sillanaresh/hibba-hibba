<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Garden 🌸</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Settings Icon - Fixed Top Right -->
    <button id="settingsBtn" class="settings-icon" title="Admin Settings">⚙️</button>

    <div class="container">
        <!-- Header with Category Buttons -->
        <header>
            <div class="header-left">
                <h1>Fun Garden 😝</h1>
                <p class="subtitle">Draw something cute and add it to our garden!</p>
            </div>
            <!-- Category Selection moved to top-right -->
            <div class="category-buttons">
                <button class="category-btn" data-category="cat">
                    <span class="emoji">🐱</span>
                </button>
                <button class="category-btn" data-category="dog">
                    <span class="emoji">🐶</span>
                </button>
                <button class="category-btn" data-category="flower">
                    <span class="emoji">🌸</span>
                </button>
                <button class="category-btn" data-category="fish">
                    <span class="emoji">🐟</span>
                </button>
                <button class="category-btn" data-category="duck">
                    <span class="emoji">🦆</span>
                </button>
            </div>
        </header>

        <!-- Garden Grid -->
        <div class="garden">
            <h2>Our Garden</h2>
            <div id="gardenGrid" class="garden-grid">
                <!-- Drawings will appear here -->
            </div>
        </div>
    </div>

    <!-- Drawing Modal -->
    <div id="drawingModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Draw your <span id="currentCategory"></span> <span id="categoryEmoji"></span></h3>
                <button class="close-btn" id="closeModal">&times;</button>
            </div>

            <div class="drawing-area">
                <div class="color-palette">
                    <button class="color-btn active" data-color="#2D3047" style="background: #2D3047;" title="Black"></button>
                    <button class="color-btn" data-color="#FF6B9D" style="background: #FF6B9D;" title="Pink"></button>
                    <button class="color-btn" data-color="#93E1D8" style="background: #93E1D8;" title="Mint"></button>
                    <button class="color-btn" data-color="#FFA69E" style="background: #FFA69E;" title="Peach"></button>
                    <button class="color-btn" data-color="#B8D4E8" style="background: #B8D4E8;" title="Sky Blue"></button>
                    <button class="eraser-btn" data-color="#FFFFFF" title="Eraser">✏️</button>
                </div>
                <div class="canvas-container">
                    <canvas id="drawingCanvas" width="200" height="200"></canvas>
                </div>
            </div>

            <div class="modal-actions">
                <button id="clearCanvas" class="btn-secondary">Clear</button>
                <button id="submitDrawing" class="btn-primary">Add to Garden 🌱</button>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal">
        <div class="modal-content settings-content">
            <div class="modal-header">
                <h3>⚙️ Admin Settings</h3>
                <button class="close-btn" id="closeSettings">&times;</button>
            </div>

            <div class="settings-body">
                <!-- Add Emoji -->
                <div class="settings-section">
                    <h4>➕ Add New Emoji Category</h4>
                    <button id="addEmojiBtn" class="btn-primary">Pick Emoji</button>
                    <div id="emojiPickerContainer"></div>
                </div>

                <!-- Remove Emoji -->
                <div class="settings-section">
                    <h4>🗑️ Remove Emoji Category</h4>
                    <div id="emojiList" class="emoji-list">
                        <!-- Current emojis will appear here -->
                    </div>
                </div>

                <!-- Clear Garden -->
                <div class="settings-section">
                    <h4>🧹 Clear Entire Garden</h4>
                    <button id="clearGardenBtn" class="btn-danger">Delete All Drawings</button>
                </div>

                <!-- Remove Last N -->
                <div class="settings-section">
                    <h4>⏪ Remove Last N Drawings</h4>
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <input type="number" id="removeLastN" min="1" placeholder="Enter number" style="flex: 1; padding: 10px; border: 2px solid #FFD6E8; border-radius: 10px;">
                        <button id="removeLastNBtn" class="btn-secondary">Remove</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Emoji Picker Library -->
    <script type="module">
        import 'https://cdn.jsdelivr.net/npm/emoji-picker-element@^1/index.js';
    </script>

    <!-- Firebase SDK -->
    <script type="module" src="app.js"></script>
</body>
</html>
